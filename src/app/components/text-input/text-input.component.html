<div class="textarea-container">
  <textarea 
    placeholder="Start typing here… (or paste your text)"
    (input)="onInput($event)" [class.error]="hasError"
    [attr.maxlength]="maxLimit"
  ></textarea>

<span class="warning-text" *ngIf="hasError" style="color: #fe5f55; display: flex; align-items: center; gap: 8px; margin-top: 8px;">
    <img src="assets/images/icon-info.svg" alt="warning"> Limit reached! Your text exceeds the character limit.
  </span>

</div>
